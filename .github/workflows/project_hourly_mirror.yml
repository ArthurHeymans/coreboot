# **********************************************************************************
# Pipeline for keeping mirrors up to date
# **********************************************************************************

name: "coreboot Mirror"

on:
  # Trigger the coreboot upstream mirroring to downstream on hourly basis
  schedule:
    # Runs daily
    - cron: '0 * * * *'

jobs:
  coreboot_mirror:
    name: coreboot_mirror
    runs-on: [self-hosted, Linux, ci-prod-coreboot-mirror]

    steps:
    - uses: actions/checkout@v2

    - name: Keep downstream coreboot AMD up to dated with upstream mirror
      run: |
        cd /tmp
        rm -rf coreboot/
        sudo -u swjenci -H sh -c "git clone git@github.com:coreboot/coreboot.git"
        cd coreboot
        sudo -u swjenci -H sh -c "git branch"
        sudo -u swjenci -H sh -c "git remote add downstream git@github.com:AMD-OpenSIL/coreboot.git"
        sudo -u swjenci -H sh -c "git remote -v"
        sudo -u swjenci -H sh -c "git push -u downstream --all"
        sudo -u swjenci -H sh -c "git push -f -u downstream --tags"
